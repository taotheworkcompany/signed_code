name: Demo Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "✓ Tests passed. Commit ${{ github.sha }} is ready."

  gate:
    needs: build
    uses: ./.github/workflows/werify-deploy-gate.yml
    with:
      environment: production
      werify_api_url: 'https://dev.werify.ai'
    secrets:
      WERIFY_API_KEY:     ${{ secrets.WERIFY_API_KEY }}
      WERIFY_OWNER_EMAIL: ${{ secrets.WERIFY_OWNER_EMAIL }}

  deploy:
    needs: gate
    if: needs.gate.outputs.approved == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "🚀 Deploying to production!"
          echo "Proof: ${{ needs.gate.outputs.proof_json }}"
